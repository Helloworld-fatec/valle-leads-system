services:
  db:
    image: postgres:16-alpine
    container_name: valle_db
    restart: unless-stopped
    # Carrega as variáveis do .env (USER, PASSWORD, DB)
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Seed (manual) ─────────────────────────────────────────────────────────────
  seed:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: build
    container_name: valle_seed
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
    volumes:
      # CORREÇÃO: Monta o CSV exatamente onde o script procura (/app/seed_data.csv)
      - ./server/prisma/seed_data.csv:/app/seed_data.csv:ro
      - seed_flag:/app/seed_flag
    command: >
      sh -c "npx prisma migrate deploy && npx prisma db seed"
    profiles:
      - seed

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: valle_server
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      # Esta linha é vital para o prisma.config.ts funcionar
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
    ports:
      - "3000:3000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: valle_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

# ESTA SEÇÃO PRECISA ESTAR EXATAMENTE ASSIM NA RAIZ DO ARQUIVO
volumes:
  postgres_data:
  seed_flag:
