# Desenvolvimento com banco hospedado no Render.
# Backend e frontend rodam com hot reload em containers.

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    container_name: valle_server_dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL precisa estar definida no .env}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:?ACCESS_TOKEN_SECRET precisa estar definido no .env}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?REFRESH_TOKEN_SECRET precisa estar definido no .env}
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev
    volumes:
      - ./server:/app
      - /app/node_modules
      - /app/src/generated
    ports:
      - "3000:3000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: dev
    container_name: valle_client_dev
    env_file:
      - .env
    environment:
      VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:3000}
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5173:5173"
